name: Release on Tag

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  build-and-push:
    uses: neteye-platform/repo-commons/.github/workflows/build-docker-image.yaml@f5ab1c0368138598c023987454858b9e3f6a2ef1 # main
    with:
      working-directory: "."
      dockerfile-path: "./Dockerfile"
      image-name: ${{ github.event.repository.name }}
      push: true
    secrets: inherit
