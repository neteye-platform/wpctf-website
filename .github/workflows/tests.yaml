name: Tests

on:
  pull_request:
    branches: ['*']

jobs:
  build:
    permissions:
      contents: read
      packages: write

    uses: neteye-platform/repo-commons/.github/workflows/build-docker-image.yaml@ddb6493160c38f9f1244d911f0d47147520d5e2f # main
    with:
      working-directory: "."
      dockerfile-path: "./Dockerfile"
      image-name: ${{ github.event.repository.name }}
      push: false
    secrets: inherit

  e2e:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ github.event.repository.name }}-image
          path: ${{ runner.temp }}/

      - name: Load Docker image
        run: |
          docker load -i ${{ runner.temp }}/image.tar
          docker tag "$(docker images -q | head -1)" wpctf-website:pr

      - name: Start container
        run: docker run -d --name wpctf -p 8080:8080 wpctf-website:pr

      - name: Wait for container to be ready
        run: |
          echo "Waiting for http://127.0.0.1:8080 to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080 > /dev/null 2>&1; then
              echo "Container is ready!"
              exit 0
            fi
            echo "Attempt $i/30 - not ready yet, waiting 1s..."
            sleep 1
          done
          echo "Container did not become ready in time"
          docker logs wpctf
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 25
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Install Playwright browsers
        working-directory: website
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: website
        env:
          CI: true
          BASE_URL: http://localhost:8080
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: playwright-report
          path: website/playwright-report/
          retention-days: 3

      - name: Stop container
        if: always()
        run: |
          docker stop wpctf
          docker rm wpctf
