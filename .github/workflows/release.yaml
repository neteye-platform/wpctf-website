name: Release on Tag

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-and-push:
    permissions:
      contents: read
      packages: write

    uses: neteye-platform/repo-commons/.github/workflows/build-docker-image.yaml@5eedbd92dd141b4964cc102c5e5e694f249c1c27 # main
    with:
      working-directory: "."
      dockerfile-path: "./Dockerfile"
      image-name: ${{ github.event.repository.name }}
      push: true
    secrets: inherit
